# Pedelec ingress — fan-out to the three microservices
#
# IMPORTANT: change the `host:` value below to a hostname you control on your
# cluster (e.g. <your-namespace>.pedelec.k8s.ase.cit.tum.de). See
# docs/cluster-access.md for the hostname pattern used in this workshop.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pedelec-ingress
spec:
  rules:
    - host: example.pedelec.k8s.ase.cit.tum.de # CHANGE ME
      http:
        paths:
          - pathType: Prefix
            path: "/pedelec"
            backend:
              service:
                name: pedelec-reservation-service
                port:
                  number: 80
          - pathType: Prefix
            path: "/reservation"
            backend:
              service:
                name: pedelec-reservation-service
                port:
                  number: 80
          - pathType: Prefix
            path: "/locations"
            backend:
              service:
                name: pedelec-location-service
                port:
                  number: 80
          - pathType: Prefix
            path: "/damage"
            backend:
              service:
                name: pedelec-damage-service
                port:
                  number: 80
